name: delete-preview

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Preview environment slug to remove.
        required: true
        type: string

permissions:
  contents: write

jobs:
  delete-preview:
    name: Delete preview app
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FALSE_FLAG_GITOPS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Remove preview manifests
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          if ! printf '%s' "${ENVIRONMENT}" | grep -Eq '^[a-z0-9][a-z0-9-]{0,62}$'; then
            echo "environment must match ^[a-z0-9][a-z0-9-]{0,62}$"
            exit 1
          fi

          rm -rf "preview/${ENVIRONMENT}"

      - name: Commit preview removal
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          git config user.name "falseflag-preview-bot"
          git config user.email "falseflag-preview-bot@users.noreply.github.com"
          git add -A "preview/${ENVIRONMENT}"

          if git diff --cached --quiet; then
            echo "Preview ${ENVIRONMENT} was already absent."
            exit 0
          fi

          git commit -m "preview: remove ${ENVIRONMENT}"
          git push
