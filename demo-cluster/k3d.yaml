apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: falseflag-demo
servers: 1
agents: 1
kubeAPI:
  host: 127.0.0.1
  hostPort: "6550"
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
